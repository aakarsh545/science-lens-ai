<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Preview Set 1: Aurora Effects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #a0a8ff;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .theme-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .theme-card h2 {
            color: #a0a8ff;
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(160, 168, 255, 0.5);
        }

        /* ========================================
           AURORA EFFECTS
           Northern lights, color waves, shimmering
           ======================================== */

        /* Aurora 1: Flowing Northern Lights */
        .btn-aurora-1 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(90deg,
                #ff0080 0%, #00ff80 25%, #00ffff 50%, #00ff80 75%, #ff0080 100%);
            background-size: 200% 100%;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            box-shadow:
                0 0 20px rgba(255, 0, 128, 0.6),
                0 0 40px rgba(0, 255, 128, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.3);
            animation: aurora-flow 4s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .btn-aurora-1:hover {
            transform: scale(1.05);
            box-shadow:
                0 0 30px rgba(255, 0, 128, 0.8),
                0 0 60px rgba(0, 255, 128, 0.6),
                inset 0 0 30px rgba(255, 255, 255, 0.5);
            background-size: 300% 100%;
            animation-duration: 2s;
        }

        @keyframes aurora-flow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            25%, 75% { background-position: 50% 100%; }
        }

        /* Aurora 2: RGB Shimmer Waves */
        .btn-aurora-2 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg,
                rgba(255, 0, 128, 0.9) 0%,
                rgba(0, 255, 128, 0.9) 50%,
                rgba(128, 0, 255, 0.9) 100%);
            color: #ffffff;
            overflow: hidden;
            box-shadow:
                0 0 25px rgba(180, 100, 255, 0.5),
                0 5px 30px rgba(255, 150, 200, 0.3);
            animation: aurora-shimmer 3s ease-in-out infinite;
        }

        .btn-aurora-2::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.4) 50%,
                transparent 70%);
            animation: aurora-wave 2s ease-in-out infinite;
        }

        .btn-aurora-2:hover {
            transform: scale(1.08) translateY(-2px);
            animation: aurora-shimmer 1.5s ease-in-out infinite;
        }

        @keyframes aurora-shimmer {
            0%, 100% { filter: hue-rotate(0deg) brightness(1); }
            33% { filter: hue-rotate(30deg) brightness(1.1); }
            66% { filter: hue-rotate(60deg) brightness(1); }
        }

        @keyframes aurora-wave {
            0%, 100% { transform: translate(-30%, -30%) rotate(0deg); }
            50% { transform: translate(30%, 30%) rotate(180deg); }
        }

        /* Aurora 3: Pulsing Light Curtains */
        .btn-aurora-3 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(180deg,
                rgba(0, 255, 200, 0.8) 0%,
                rgba(100, 200, 255, 0.8) 100%);
            color: #ffffff;
            border: 2px solid transparent;
            border-image: linear-gradient(90deg,
                #00ff88, #00ffff, #ff00ff, #00ff88, #00ffff) 1;
            border-image-slice: 1;
            animation: aurora-curtain 3s ease-in-out infinite;
            box-shadow:
                0 0 40px rgba(0, 255, 200, 0.6),
                inset 0 -10px 40px rgba(0, 255, 200, 0.4);
        }

        .btn-aurora-3:hover {
            transform: scale(1.06);
            box-shadow:
                0 0 60px rgba(0, 255, 200, 0.8),
                inset 0 -15px 60px rgba(0, 255, 200, 0.5);
            animation-duration: 1.5s;
        }

        @keyframes aurora-curtain {
            0%, 100% {
                border-image-source: linear-gradient(90deg, #00ff88, #00ffff, #ff00ff, #00ff88, #00ffff);
                background-position: 0% 0%;
            }
            25%, 75% {
                border-image-source: linear-gradient(90deg, #00ffff, #ff00ff, #00ff88, #00ffff, #ff00ff);
                background-position: 0% 100%;
            }
            50% {
                border-image-source: linear-gradient(90deg, #ff00ff, #00ff88, #00ffff, #ff00ff, #00ff88);
                background-position: 0% 50%;
            }
        }

        .instructions {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px 30px;
            color: #ffffff;
            text-align: center;
            margin-top: 30px;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #a0a8ff;
        }

        .instructions p {
            opacity: 0.8;
            line-height: 1.6;
        }

        .instructions code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Aurora Effects</h1>
        <p class="subtitle">Flowing northern lights, shimmering waves, light curtains</p>

        <div class="themes-grid">
            <!-- Aurora Theme Card -->
            <div class="theme-card">
                <h2>Aurora</h2>
                <button class="btn-aurora-1">Flowing Northern Lights</button>
            </div>

            <!-- Nebula Dream Theme Card -->
            <div class="theme-card">
                <h2>Nebula Dream</h2>
                <button class="btn-aurora-2">RGB Shimmer Waves</button>
            </div>

            <!-- Cosmic Infinity Theme Card -->
            <div class="theme-card">
                <h2>Cosmic Infinity</h2>
                <button class="btn-aurora-3">Pulsing Light Curtains</button>
            </div>
        </div>

        <div class="instructions">
            <h3>🎨 How to Use</h3>
            <p>
                1. Save this page as <code>set1.html</code><br>
                2. Open in Chrome/Safari in a new tab<br>
                3. Compare with other sets to choose your favorite effects
            </p>
        </div>
    </div>
</body>
</html>
