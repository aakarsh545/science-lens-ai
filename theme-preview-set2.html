<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Preview Set 2: Nebula Dream Effects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d1a 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        h1 {
            color: #ff77e9;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 119, 233, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #b77dff;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .theme-card {
            background: rgba(183, 125, 255, 0.05);
            border: 1px solid rgba(183, 125, 255, 0.15);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .theme-card h2 {
            color: #b77dff;
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(183, 125, 255, 0.5);
        }

        /* ========================================
           NEBULA DREAM EFFECTS
           Swirling particles, gas clouds, cosmic dust
           ======================================== */

        /* Nebula 1: Swirling Gas Cloud */
        .btn-nebula-1 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: radial-gradient(ellipse at 30% 30%,
                rgba(183, 125, 255, 0.9) 0%,
                rgba(119, 80, 255, 0.7) 40%,
                rgba(80, 150, 255, 0.5) 70%,
                rgba(30, 80, 200, 0.3) 100%);
            background-size: 150% 150%;
            color: #ffffff;
            box-shadow:
                0 0 30px rgba(183, 125, 255, 0.6),
                inset 0 0 20px rgba(119, 80, 255, 0.4);
            animation: nebula-swirl 6s ease-in-out infinite;
        }

        .btn-nebula-1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            background: radial-gradient(circle at 70% 20%,
                rgba(255, 200, 200, 0.3) 0%,
                transparent 50%);
            animation: nebula-pulse 3s ease-in-out infinite;
        }

        .btn-nebula-1:hover {
            transform: scale(1.08);
            box-shadow:
                0 0 50px rgba(183, 125, 255, 0.9),
                inset 0 0 30px rgba(119, 80, 255, 0.6);
            animation-duration: 3s;
        }

        @keyframes nebula-swirl {
            0%, 100% { background-position: 0% 0%; }
            25% { background-position: 100% 30%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 70%; }
        }

        @keyframes nebula-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        /* Nebula 2: Cosmic Dust Storm */
        .btn-nebula-2 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg,
                rgba(147, 80, 255, 0.9) 0%,
                rgba(200, 100, 255, 0.7) 50%,
                rgba(255, 150, 200, 0.5) 100%);
            color: #ffffff;
            overflow: hidden;
            box-shadow:
                0 0 25px rgba(147, 80, 255, 0.5),
                inset 0 -5px 20px rgba(255, 200, 200, 0.3);
        }

        .btn-nebula-2::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            top: -100%;
            left: -100%;
            background: radial-gradient(circle,
                rgba(200, 150, 255, 0.2) 0%,
                transparent 40%,
                rgba(147, 80, 255, 0.15) 60%,
                transparent 80%);
            background-size: 50px 50px;
            animation: dust-storm 4s linear infinite;
        }

        .btn-nebula-2:hover {
            transform: scale(1.06) translateY(-1px);
            animation-duration: 2s;
        }

        @keyframes dust-storm {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, 50px) rotate(360deg); }
        }

        /* Nebula 3: Glowing Particle Ring */
        .btn-nebula-3 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: conic-gradient(from 180deg,
                rgba(180, 100, 255, 0.85) 0deg,
                rgba(220, 100, 255, 0.7) 60deg,
                rgba(255, 100, 200, 0.7) 120deg,
                rgba(180, 100, 255, 0.85) 180deg,
                rgba(100, 80, 255, 0.6) 240deg,
                rgba(200, 100, 255, 0.7) 300deg,
                rgba(180, 100, 255, 0.85) 360deg);
            color: #ffffff;
            box-shadow:
                0 0 35px rgba(220, 100, 255, 0.7),
                0 0 10px rgba(180, 100, 255, 0.9);
            animation: particle-ring 5s linear infinite;
        }

        .btn-nebula-3::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150%;
            height: 150%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: ring-expand 3s ease-in-out infinite;
        }

        .btn-nebula-3:hover {
            transform: scale(1.08);
            box-shadow:
                0 0 50px rgba(220, 100, 255, 1),
                0 0 20px rgba(180, 100, 255, 1);
            animation-duration: 2.5s;
        }

        @keyframes particle-ring {
            0% { transform: rotate(0deg); filter: brightness(1); }
            50% { transform: rotate(180deg); filter: brightness(1.2); }
            100% { transform: rotate(360deg); filter: brightness(1); }
        }

        @keyframes ring-expand {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
        }

        .instructions {
            background: rgba(75, 30, 120, 0.7);
            border: 1px solid rgba(183, 125, 255, 0.2);
            border-radius: 15px;
            padding: 25px 30px;
            color: #ffffff;
            text-align: center;
            margin-top: 30px;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #b77dff;
        }

        .instructions p {
            opacity: 0.8;
            line-height: 1.6;
        }

        .instructions code {
            background: rgba(183, 125, 255, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            color: #ff99ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Nebula Dream Effects</h1>
        <p class="subtitle">Swirling gas clouds, cosmic dust storms, particle rings</p>

        <div class="themes-grid">
            <!-- Aurora Theme Card -->
            <div class="theme-card">
                <h2>Aurora</h2>
                <button class="btn-nebula-1">Swirling Gas Cloud</button>
            </div>

            <!-- Nebula Dream Theme Card -->
            <div class="theme-card">
                <h2>Nebula Dream</h2>
                <button class="btn-nebula-2">Cosmic Dust Storm</button>
            </div>

            <!-- Cosmic Infinity Theme Card -->
            <div class="theme-card">
                <h2>Cosmic Infinity</h2>
                <button class="btn-nebula-3">Glowing Particle Ring</button>
            </div>
        </div>

        <div class="instructions">
            <h3>🎨 How to Use</h3>
            <p>
                1. Save this page as <code>set2.html</code><br>
                2. Open in Chrome/Safari in a new tab<br>
                3. Compare with other sets to choose your favorite effects
            </p>
        </div>
    </div>
</body>
</html>
