<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Preview Set 5: Quantum Effects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a0a2e 40%, #000000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Digital distortion background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(90deg, transparent 49%, rgba(0, 255, 255, 0.03) 50%, transparent 51%),
                linear-gradient(0deg, transparent 49%, rgba(255, 0, 255, 0.03) 50%, transparent 51%);
            background-size: 30px 30px;
            animation: grid-distortion 4s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes grid-distortion {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        .container {
            max-width: 1400px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #00ffff;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow:
                0 0 30px rgba(0, 255, 255, 0.6),
                0 0 10px rgba(0, 200, 255, 0.4);
            letter-spacing: 2px;
            animation: title-glitch 5s steps(3) infinite;
        }

        .subtitle {
            color: #ff00ff;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .theme-card {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .theme-card h2 {
            color: #00ffff;
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* ========================================
           QUANTUM EFFECTS
           Reality warping, glitch, energy fields, dimensional shift
           ======================================== */

        /* Quantum 1: Reality Warp */
        .btn-quantum-1 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(45deg,
                rgba(0, 255, 255, 0.9) 0%,
                rgba(0, 200, 255, 0.7) 25%,
                rgba(255, 0, 255, 0.7) 50%,
                rgba(200, 0, 255, 0.9) 75%,
                rgba(0, 255, 200, 0.7) 100%);
            background-size: 200% 200%;
            color: #ffffff;
            box-shadow:
                0 0 25px rgba(0, 255, 255, 0.8),
                0 0 50px rgba(0, 200, 255, 0.5),
                inset 0 0 30px rgba(0, 255, 255, 0.4);
            animation: reality-warp 6s ease-in-out infinite;
        }

        .btn-quantum-1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid transparent;
            border-image: linear-gradient(90deg,
                rgba(0, 255, 255, 0.8) 0%,
                rgba(0, 255, 255, 0.4) 25%,
                rgba(0, 255, 255, 0.8) 50%,
                rgba(0, 255, 255, 0.4) 75%,
                rgba(0, 255, 255, 0.8) 100%) 2;
            animation: warp-border 3s steps(4) infinite;
        }

        .btn-quantum-1:hover {
            transform: scale(1.08) skew(2deg);
            box-shadow:
                0 0 40px rgba(0, 255, 255, 1),
                0 0 70px rgba(0, 200, 255, 0.7),
                inset 0 0 50px rgba(0, 255, 255, 0.5);
            animation-duration: 3s;
        }

        @keyframes reality-warp {
            0%, 100% { background-position: 0% 0%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 50% 100%; }
            75% { background-position: 100% 50%; }
        }

        @keyframes warp-border {
            0% { border-image-source: linear-gradient(90deg, rgba(0,255,255,0.8) 0%, rgba(0,255,255,0.4) 25%, rgba(0,255,255,0.8) 50%, rgba(0,255,255,0.4) 75%, rgba(0,255,255,0.8) 100%); }
            25% { border-image-source: linear-gradient(90deg, rgba(0,255,255,0.8) 50%, rgba(0,255,255,0.4) 75%, rgba(0,255,255,0.8) 100%, rgba(0,255,255,0.4) 25%); }
            50% { border-image-source: linear-gradient(90deg, rgba(0,255,255,0.8) 100%, rgba(0,255,255,0.4) 25%, rgba(0,255,255,0.8) 50%, rgba(0,255,255,0.4) 75%); }
            75% { border-image-source: linear-gradient(90deg, rgba(0,255,255,0.8) 75%, rgba(0,255,255,0.4) 100%, rgba(0,255,255,0.8) 50%, rgba(0,255,255,0.4) 25%); }
        }

        /* Quantum 2: Glitch Distortion */
        .btn-quantum-2 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: rgba(0, 255, 200, 0.9);
            color: #ffffff;
            box-shadow:
                2px 2px 0 rgba(0, 255, 255, 0.6),
                2px -2px 0 rgba(255, 0, 200, 0.4);
            animation: glitch-shake 0.3s steps(5) infinite;
        }

        .btn-quantum-2::before,
        .btn-quantum-2::after {
            content: 'EQUIP THEME';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .btn-quantum-2::before {
            color: rgba(0, 255, 200, 0.8);
            animation: glitch-text-1 2s steps(3) infinite;
        }

        .btn-quantum-2::after {
            color: rgba(255, 0, 200, 0.8);
            animation: glitch-text-2 2. steps(3) infinite;
            clip-path: inset(0 0 100% 30% 70% 100%);
        }

        .btn-quantum-2:hover {
            background: rgba(255, 0, 200, 0.95);
            animation: glitch-shake 0.15s steps(5) infinite;
            box-shadow:
                3px 3px 0 rgba(0, 255, 255, 0.9),
                3px -3px 0 rgba(255, 0, 200, 0.5);
        }

        @keyframes glitch-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(0, 0); }
            80% { transform: translate(-1px, 2px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes glitch-text-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(0, 0); }
            80% { transform: translate(-1px, 1px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-text-2 {
            0% { transform: translate(0); }
            25% { transform: translate(1px, 0); }
            50% { transform: translate(0, -1px); }
            75% { transform: translate(-1px, 0); }
            100% { transform: translate(0, 0); }
        }

        /* Quantum 3: Energy Field */
        .btn-quantum-3 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: radial-gradient(circle at 50% 50%,
                rgba(0, 255, 255, 1) 0%,
                rgba(0, 200, 255, 0.3) 40%,
                rgba(255, 0, 255, 0.2) 70%,
                rgba(255, 0, 200, 0.3) 100%);
            background-size: 150% 150%;
            color: #ffffff;
            box-shadow:
                0 0 40px rgba(0, 255, 255, 0.8),
                inset 0 0 25px rgba(0, 255, 255, 0.5);
            animation: energy-pulse 4s ease-in-out infinite;
        }

        .btn-quantum-3::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg,
                transparent 0deg,
                rgba(0, 255, 255, 0.3) 30deg,
                transparent 60deg,
                rgba(0, 255, 200, 0.3) 120deg,
                transparent 180deg,
                rgba(0, 200, 255, 0.3) 240deg,
                transparent 300deg);
            animation: energy-rotate 6s linear infinite;
            mix-blend-mode: screen;
        }

        .btn-quantum-3::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 20px #ffffff;
            animation: core-pulse 2s ease-in-out infinite;
        }

        .btn-quantum-3:hover {
            transform: scale(1.1);
            box-shadow:
                0 0 60px rgba(0, 255, 255, 1),
                inset 0 0 40px rgba(0, 255, 255, 0.7);
            animation-duration: 2s;
        }

        @keyframes energy-pulse {
            0%, 100% { background-position: 50% 50%; }
            25% { background-position: 30% 70%; }
            50% { background-position: 70% 30%; }
            75% { background-position: 30% 30%; }
        }

        @keyframes energy-rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes core-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
        }

        @keyframes title-glitch {
            0% { transform: translate(0); clip-path: inset(0 0 100% 0 0); }
            10% { transform: translate(-1px) clip-path: inset(0 0 100% 30% 70%); }
            20% { transform: translate(1px) clip-path: inset(0 0 100% 0 0); }
            30% { transform: translate(0) clip-path: inset(0 0 100% 70% 30%); }
            40% { transform: translate(0) clip-path: inset(0 0 100% 0 0); }
            50% { transform: translate(0) clip-path: inset(0 30% 100% 70% 70%); }
            60% { transform: translate(0) clip-path: inset(0 30% 100% 0 0); }
            70% { transform: translate(0) clip-path: inset(0 30% 100% 0 0); }
            80% { transform: translate(0) clip-path: inset(0 0 100% 70% 30%); }
            90% { transform: translate(0) clip-path: inset(0 0 100% 0 0); }
            100% { transform: translate(0) clip-path: inset(0 0 100% 0 0); }
        }

        .instructions {
            background: rgba(0, 255, 255, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px 30px;
            color: #ffffff;
            text-align: center;
            margin-top: 30px;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #00ffff;
        }

        .instructions p {
            opacity: 0.8;
            line-height: 1.6;
        }

        .instructions code {
            background: rgba(0, 255, 255, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            color: #ff00ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Quantum Effects</h1>
        <p class="subtitle">Reality warping, glitch distortion, energy fields</p>

        <div class="themes-grid">
            <!-- Aurora Theme Card -->
            <div class="theme-card">
                <h2>Aurora</h2>
                <button class="btn-quantum-1">Reality Warp</button>
            </div>

            <!-- Nebula Dream Theme Card -->
            <div class="theme-card">
                <h2>Nebula Dream</h2>
                <button class="btn-quantum-2">Glitch Distortion</button>
            </div>

            <!-- Cosmic Infinity Theme Card -->
            <div class="theme-card">
                <h2>Cosmic Infinity</h2>
                <button class="btn-quantum-3">Energy Field</button>
            </div>
        </div>

        <div class="instructions">
            <h3>🎨 How to Use</h3>
            <p>
                1. Save this page as <code>set5.html</code><br>
                2. Open in Chrome/Safari in a new tab<br>
                3. Compare with other sets to choose your favorite effects
            </p>
        </div>
    </div>
</body>
</html>
