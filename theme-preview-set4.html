<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Preview Set 4: Ethereal Effects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8f0ff 0%, #e0e7ff 50%, #d4c1ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating light orbs background */
        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-orb-1 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 250px;
            height: 250px;
            bottom: 20%;
            right: 15%;
            background: radial-gradient(circle, rgba(200, 180, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-orb-2 10s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float-orb-1 {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            50% { transform: translate(100px, 50px) scale(1.2); opacity: 0.7; }
        }

        @keyframes float-orb-2 {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(-80px, -40px) scale(1.3); opacity: 0.6; }
        }

        .container {
            max-width: 1400px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #8b5cf6;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(200, 150, 255, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #9d4edd;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .theme-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .theme-card h2 {
            color: #9d4edd;
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(200, 150, 255, 0.5);
        }

        /* ========================================
           EHEREAL EFFECTS
           Soft glowing orbs, light refraction, heavenly particles
           ======================================== */

        /* Ethereal 1: Soft Orb Glow */
        .btn-ethereal-1 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(135deg,
                rgba(255, 220, 150, 0.95) 0%,
                rgba(255, 180, 200, 0.85) 50%,
                rgba(255, 150, 200, 0.75) 100%);
            color: #ffffff;
            box-shadow:
                0 0 30px rgba(255, 200, 150, 0.8),
                0 0 60px rgba(255, 150, 200, 0.5),
                inset 0 0 40px rgba(255, 255, 255, 0.4);
            animation: orb-glow 3s ease-in-out infinite;
        }

        .btn-ethereal-1::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                rgba(255, 255, 255, 0.6) 0%,
                transparent 50%);
            animation: orb-pulse 2s ease-in-out infinite;
        }

        .btn-ethereal-1:hover {
            transform: scale(1.08);
            box-shadow:
                0 0 50px rgba(255, 200, 150, 1),
                0 0 80px rgba(255, 180, 200, 0.7),
                inset 0 0 60px rgba(255, 255, 255, 0.5);
            animation-duration: 1.5s;
        }

        @keyframes orb-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 200, 150, 0.8), 0 0 60px rgba(255, 150, 200, 0.5), inset 0 0 40px rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 0 40px rgba(255, 200, 150, 1), 0 0 80px rgba(255, 150, 200, 0.7), inset 0 0 60px rgba(255, 255, 255, 0.5); }
        }

        @keyframes orb-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
        }

        /* Ethereal 2: Light Refraction */
        .btn-ethereal-2 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            overflow: hidden;
            box-shadow:
                0 0 25px rgba(200, 180, 255, 0.6),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-ethereal-2::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg,
                rgba(255, 200, 200, 0.3) 0deg,
                rgba(255, 220, 150, 0.3) 60deg,
                rgba(255, 200, 150, 0.3) 120deg,
                rgba(255, 220, 150, 0.3) 180deg,
                rgba(255, 200, 200, 0.3) 240deg,
                rgba(255, 220, 150, 0.3) 300deg,
                rgba(255, 200, 200, 0.3) 360deg);
            animation: prismatic-rotate 8s linear infinite;
            mix-blend-mode: overlay;
        }

        .btn-ethereal-2::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: center-pulse 3s ease-in-out infinite;
        }

        .btn-ethereal-2:hover {
            transform: scale(1.08);
            box-shadow:
                0 0 35px rgba(200, 180, 255, 0.9),
                inset 0 0 40px rgba(255, 255, 255, 0.5);
            animation-duration: 4s;
        }

        @keyframes prismatic-rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes center-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        /* Ethereal 3: Heavenly Rays */
        .btn-ethereal-3 {
            position: relative;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(180deg,
                rgba(255, 230, 230, 0.9) 0%,
                rgba(255, 210, 200, 0.7) 50%,
                rgba(255, 200, 180, 0.5) 100%);
            color: #ffffff;
            box-shadow:
                0 0 35px rgba(255, 200, 180, 0.7),
                0 0 15px 40px rgba(255, 180, 180, 0.4);
            animation: heavenly-glow 4s ease-in-out infinite;
        }

        .btn-ethereal-3::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 300%;
            background: linear-gradient(180deg,
                rgba(255, 255, 255, 0.5) 0%,
                transparent 30%,
                rgba(255, 255, 255, 0.5) 50%,
                transparent 70%,
                rgba(255, 255, 255, 0.5) 100%);
            animation: ray-shine 3s linear infinite;
        }

        .btn-ethereal-3:hover {
            transform: scale(1.06);
            box-shadow:
                0 0 50px rgba(255, 200, 180, 1),
                0 0 25px rgba(255, 180, 180, 0.6);
            animation-duration: 2s;
        }

        @keyframes heavenly-glow {
            0%, 100% { box-shadow: 0 0 35px rgba(255, 200, 180, 0.7), 0 0 15px 40px rgba(255, 180, 180, 0.4); }
            50% { box-shadow: 0 0 50px rgba(255, 200, 180, 1), 0 0 25px rgba(255, 180, 180, 0.6); }
        }

        @keyframes ray-shine {
            0% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-20px); opacity: 0.6; }
            100% { transform: translateY(0); opacity: 0.3; }
        }

        .instructions {
            background: rgba(200, 180, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px 30px;
            color: #ffffff;
            text-align: center;
            margin-top: 30px;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #9d4edd;
        }

        .instructions p {
            opacity: 0.8;
            line-height: 1.6;
        }

        .instructions code {
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
            color: #f0f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Ethereal Effects</h1>
        <p class="subtitle">Soft glowing orbs, light refraction, heavenly rays</p>

        <div class="themes-grid">
            <!-- Aurora Theme Card -->
            <div class="theme-card">
                <h2>Aurora</h2>
                <button class="btn-ethereal-1">Soft Orb Glow</button>
            </div>

            <!-- Nebula Dream Theme Card -->
            <div class="theme-card">
                <h2>Nebula Dream</h2>
                <button class="btn-ethereal-2">Light Refraction</button>
            </div>

            <!-- Cosmic Infinity Theme Card -->
            <div class="theme-card">
                <h2>Cosmic Infinity</h2>
                <button class="btn-ethereal-3">Heavenly Rays</button>
            </div>
        </div>

        <div class="instructions">
            <h3>🎨 How to Use</h3>
            <p>
                1. Save this page as <code>set4.html</code><br>
                2. Open in Chrome/Safari in a new tab<br>
                3. Compare with other sets to choose your favorite effects
            </p>
        </div>
    </div>
</body>
</html>
